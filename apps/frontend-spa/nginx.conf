# =============================================================================
# nginx configuration for EcoTrace React SPA
# =============================================================================
# Runs on port 8080 (non-privileged, compatible with non-root nginx user)
# =============================================================================

server {
    listen 8080 http2;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Logging ──────────────────────────────────────────────────────────────
    # Logs go to stdout/stderr so Docker captures them via `docker logs`
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    # Reduces transferred payload for JS/CSS by ~60-70%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;
    # Content-Security-Policy: allows API calls to the backend and Google Fonts
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         connect-src 'self' https: http://localhost:8000 http://ecotrace-api:8000; \
         img-src 'self' data:;" always;

    # ── Static Asset Caching ─────────────────────────────────────────────────
    # Vite fingerprints all JS/CSS/font assets with a content hash in the filename.
    # Safe to cache for 1 year — a new deploy produces new filenames.
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health Check Endpoint ─────────────────────────────────────────────────
    # Used by Docker HEALTHCHECK and load balancers
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── React Router — HTML5 History Mode ────────────────────────────────────
    # For any path that doesn't match a real file (e.g. /dashboard, /goals),
    # serve index.html so React Router handles the route client-side.
    location / {
        try_files $uri $uri/ /index.html;

        # index.html itself must NOT be cached so the browser always gets
        # the latest entrypoint (which references hashed asset filenames)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
