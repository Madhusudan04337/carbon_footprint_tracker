# =============================================================================
# cloudbuild.yaml — Google Cloud Build Pipeline
# =============================================================================
# Triggered automatically by Cloud Build trigger on pushes to main branch,
# OR invoked manually by the deploy-backend/frontend scripts.
#
# Substitution variables (passed by trigger or --substitutions flag):
#   _SERVICE        : "backend" | "frontend"
#   _IMAGE          : Full Artifact Registry image path with tag
#   _VITE_API_BASE_URL : (frontend only) the backend Cloud Run URL
#   _REGION         : GCP region (default: asia-south1)
#   _CLOUDSQL_INSTANCE : Full Cloud SQL connection name
#
# Steps:
#   1. Build Docker image (multi-stage, layer-cache from AR)
#   2. Push to Artifact Registry
#   3. Deploy to Cloud Run
#   4. Verify health check
# =============================================================================

substitutions:
  _SERVICE: backend
  _REGION: asia-south1
  _IMAGE: ""                  # Must be set by trigger or --substitutions
  _VITE_API_BASE_URL: ""      # Frontend only
  _CLOUDSQL_INSTANCE: ""      # Backend only

options:
  # Use a higher-tier machine for faster multi-stage builds
  machineType: E2_HIGHCPU_8
  # Substitute all variables — fail loudly if any are missing
  substitution_option: ALLOW_LOOSE
  # Stream logs to Cloud Logging in real time
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s   # 30-minute build timeout

steps:

  # ── Step 1: Pull cached image layers from Artifact Registry ────────────────
  # Cloud Build's built-in layer caching only works within the same build worker.
  # Explicitly pulling the :cache tag before building lets Docker reuse layers
  # from the previous successful build (Kaniko-style remote caching).
  - name: "gcr.io/cloud-builders/docker"
    id: pull-cache
    entrypoint: bash
    args:
      - -c
      - |
        CACHE_IMAGE=$(echo "${_IMAGE}" | sed 's/:[^:]*$/:cache/')
        docker pull "$$CACHE_IMAGE" 2>/dev/null || echo "No cache image found — fresh build."

  # ── Step 2: Build the Docker image ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    waitFor: ["pull-cache"]
    # Only runs when _SERVICE=backend
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_SERVICE}" != "backend" ]; then echo "Skipping backend build"; exit 0; fi

        CACHE_IMAGE=$(echo "${_IMAGE}" | sed 's/:[^:]*$/:cache/')

        docker build \
          --file=apps/backend-api/Dockerfile \
          --target=runtime \
          --tag="${_IMAGE}" \
          --tag="$$CACHE_IMAGE" \
          --cache-from="$$CACHE_IMAGE" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          .

  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    waitFor: ["pull-cache"]
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_SERVICE}" != "frontend" ]; then echo "Skipping frontend build"; exit 0; fi

        CACHE_IMAGE=$(echo "${_IMAGE}" | sed 's/:[^:]*$/:cache/')

        docker build \
          --file=apps/frontend-spa/Dockerfile \
          --tag="${_IMAGE}" \
          --tag="$$CACHE_IMAGE" \
          --cache-from="$$CACHE_IMAGE" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --build-arg VITE_API_BASE_URL="${_VITE_API_BASE_URL}" \
          .

  # ── Step 3: Push to Artifact Registry ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    waitFor: ["build-backend", "build-frontend"]
    entrypoint: bash
    args:
      - -c
      - |
        CACHE_IMAGE=$(echo "${_IMAGE}" | sed 's/:[^:]*$/:cache/')
        docker push "${_IMAGE}"
        docker push "$$CACHE_IMAGE"
        echo "Pushed: ${_IMAGE}"

  # ── Step 4: Deploy backend to Cloud Run ─────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: deploy-backend
    waitFor: ["push-image"]
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_SERVICE}" != "backend" ]; then echo "Skipping backend deploy"; exit 0; fi

        gcloud run deploy ecotrace-api \
          --image="${_IMAGE}" \
          --region="${_REGION}" \
          --platform=managed \
          --service-account="ecotrace-backend-sa@$PROJECT_ID.iam.gserviceaccount.com" \
          --allow-unauthenticated \
          --add-cloudsql-instances="${_CLOUDSQL_INSTANCE}" \
          --set-secrets="DATABASE_URL=ecotrace-db-url:latest,JWT_SECRET_KEY=ecotrace-jwt-secret:latest" \
          --set-env-vars="ENVIRONMENT=production,PROJECT_NAME=EcoTrace Carbon Footprint API,JWT_ALGORITHM=HS256,ACCESS_TOKEN_EXPIRE_MINUTES=60,LOG_LEVEL=info,WEB_CONCURRENCY=2,PORT=8080" \
          --cpu=1 \
          --memory=512Mi \
          --cpu-throttling \
          --min-instances=1 \
          --max-instances=10 \
          --concurrency=80 \
          --port=8080 \
          --timeout=300 \
          --quiet

        echo "Backend deployed: $(gcloud run services describe ecotrace-api \
          --region=${_REGION} --format='value(status.url)')"

  # ── Step 5: Deploy frontend to Cloud Run ────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: deploy-frontend
    waitFor: ["push-image"]
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_SERVICE}" != "frontend" ]; then echo "Skipping frontend deploy"; exit 0; fi

        gcloud run deploy ecotrace-frontend \
          --image="${_IMAGE}" \
          --region="${_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --cpu=0.5 \
          --memory=256Mi \
          --cpu-throttling \
          --min-instances=0 \
          --max-instances=5 \
          --concurrency=1000 \
          --port=8080 \
          --timeout=60 \
          --quiet

        echo "Frontend deployed: $(gcloud run services describe ecotrace-frontend \
          --region=${_REGION} --format='value(status.url)')"

  # ── Step 6: Health verification ──────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: health-check
    waitFor: ["deploy-backend", "deploy-frontend"]
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_SERVICE}" = "backend" ]; then
          URL=$(gcloud run services describe ecotrace-api \
            --region="${_REGION}" --format="value(status.url)")
          echo "Verifying backend health: $$URL/"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$$URL/")
            if [ "$$STATUS" = "200" ]; then
              echo "✅ Backend healthy (HTTP 200)"
              exit 0
            fi
            echo "   Attempt $$i/10 — HTTP $$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "❌ Backend health check FAILED after 10 attempts"; exit 1
        fi

        if [ "${_SERVICE}" = "frontend" ]; then
          URL=$(gcloud run services describe ecotrace-frontend \
            --region="${_REGION}" --format="value(status.url)")
          echo "Verifying frontend health: $$URL/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$$URL/health")
            if [ "$$STATUS" = "200" ]; then
              echo "✅ Frontend healthy (HTTP 200)"
              exit 0
            fi
            echo "   Attempt $$i/10 — HTTP $$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "❌ Frontend health check FAILED"; exit 1
        fi
